<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Postman API Client - UA Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --border: #E6E6E6; --blue: #097BED; --orange: #FF6C37; --text: #212121; --sub: #6B6B6B; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 250px; border-right: 1px solid var(--border); background: #F9F9F9; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        
        .url-section { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        .method { border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; font-weight: 600; color: #0CBB52; font-size: 13px; }
        .url-input { flex: 1; border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 13px; outline: none; }
        .send-btn { background: var(--blue); color: white; border: none; padding: 8px 25px; border-radius: 4px; font-weight: 600; cursor: pointer; }

        .config-area { padding: 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; outline: none; }
        
        .response-header { padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; justify-content: space-between; background: #FFF; }
        .response-body { flex: 1; padding: 20px; background: #FAFAFA; overflow-y: auto; }

        /* User Agent Card */
        .ua-card { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .ua-card:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ua-text { font-family: 'Consolas', monospace; font-size: 12px; color: #0451A5; word-break: break-all; flex: 1; padding-right: 15px; }
        .copy-btn { background: #E8F2FF; color: var(--blue); border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .copy-btn:active { background: var(--blue); color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <label>Device Brand Selection</label>
    <select id="brandSelect" size="15">
        <option value="Samsung" selected>Samsung Galaxy</option>
        <option value="Google">Google Pixel</option>
        <option value="Xiaomi">Xiaomi / Redmi</option>
        <option value="OnePlus">OnePlus</option>
        <option value="Oppo">Oppo</option>
        <option value="Vivo">Vivo</option>
        <option value="Huawei">Huawei</option>
        <option value="Asus">Asus ROG</option>
        <option value="Sony">Sony Xperia</option>
        <option value="Motorola">Motorola</option>
        <option value="Realme">Realme</option>
        <option value="Nokia">Nokia Android</option>
        <option value="LG">LG Velvet/V</option>
        <option value="ZTE">ZTE Nubia</option>
        <option value="Infinix">Infinix Note</option>
    </select>
</div>

<div class="main-content">
    <div class="url-section">
        <div class="method">GET</div>
        <input type="text" class="url-input" value="https://api.generator.io/v1/generate-user-agents?bypass=true">
        <button class="send-btn" onclick="generate()">Send</button>
    </div>

    <div class="config-area">
        <div>
            <label>Target Platform</label>
            <select id="platformSelect">
                <option value="CHROME">Chrome Mobile (Normal)</option>
                <option value="FB_IAB">Facebook In-App</option>
                <option value="FB_LITE">Facebook Lite</option>
                <option value="TIKTOK">TikTok Mobile</option>
                <option value="TELEGRAM">Telegram Android</option>
                <option value="SNAPCHAT">Snapchat</option>
                <option value="LINKEDIN">LinkedIn In-App</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Quantity</label>
                <input type="number" id="qty" value="10">
            </div>
            <div style="flex: 1;">
                <label>Chrome Ver (130-145)</label>
                <input type="text" id="vRange" value="130-145">
            </div>
        </div>
    </div>

    <div class="response-header">
        <div><b>Body</b> &nbsp; Cookies &nbsp; Headers</div>
        <div>Status: <span style="color: #0CBB52; font-weight: 600;">200 OK</span> &nbsp; Time: <span id="time">0ms</span></div>
    </div>

    <div class="response-body" id="output">
        <div style="color: var(--sub); text-align: center; margin-top: 50px;">Click 'Send' to generate bypassed user agents.</div>
    </div>
</div>

<script>
    // මචං, මෙතනට ඔයාට ඕනෙ තරම් Devices ලේසියෙන්ම ඇඩ් කරගන්න පුළුවන්.
    const deviceModels = {
        'Samsung': ['SM-S901B', 'SM-S918B', 'SM-G998B', 'SM-A525F', 'SM-N986B', 'SM-S22ULTRA'],
        'Google': ['Pixel 8 Pro', 'Pixel 7a', 'Pixel 6', 'Pixel 5', 'Pixel Fold'],
        'Xiaomi': ['M2101K6G', 'Redmi Note 12', 'Poco F5', 'Xiaomi 13 Ultra'],
        'OnePlus': ['CPH2449', 'LE2113', 'NE2213', 'OnePlus 11'],
        'Oppo': ['Find X6 Pro', 'Reno 10 Pro', 'CPH2207'],
        'Vivo': ['V2202', 'Vivo X100 Pro', 'V2105'],
        'Huawei': ['P60 Pro', 'Mate 50 Pro', 'VOG-L29'],
        'Asus': ['ROG Phone 7', 'ZenFone 10'],
        'Sony': ['Xperia 1 V', 'Xperia 5 IV'],
        'Motorola': ['Edge 40 Pro', 'Moto G84'],
        'Realme': ['RMX3741', 'Realme GT 5'],
        'Nokia': ['Nokia G42', 'Nokia X30'],
        'LG': ['LG Velvet', 'LG V60 ThinQ'],
        'ZTE': ['Nubia Z50', 'Axon 40'],
        'Infinix': ['Infinix Note 30', 'Zero Ultra']
    };

    function generate() {
        const brand = document.getElementById('brandSelect').value;
        const platform = document.getElementById('platformSelect').value;
        const qty = parseInt(document.getElementById('qty').value);
        const vRange = document.getElementById('vRange').value.split('-');
        const vMin = parseInt(vRange[0]);
        const vMax = parseInt(vRange[1]);
        const startTime = performance.now();

        let html = "";
        const models = deviceModels[brand];

        for(let i=0; i<qty; i++) {
            const model = models[Math.floor(Math.random() * models.length)];
            const chrome = `${Math.floor(Math.random() * (vMax - vMin + 1)) + vMin}.0.${Math.floor(Math.random()*3000)+4000}.${Math.floor(Math.random()*150)}`;
            const android = Math.floor(Math.random() * 5) + 10;
            const build = `TP1A.${Math.floor(Math.random()*900000)+100000}.014`;

            let ua = `Mozilla/5.0 (Linux; Android ${android}; ${model} Build/${build}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${chrome} Mobile Safari/537.36`;

            if(platform === 'FB_IAB') ua += ` [FB_IAB/FB4A;FBAV/440.0.0.31.114;]`;
            if(platform === 'FB_LITE') ua += ` [FBAN/MessengerLite;FBAV/320.0.0.1.1;]`;
            if(platform === 'TIKTOK') ua += ` TikTok 28.1.3 rv:28103`;
            if(platform === 'TELEGRAM') ua += ` Telegram-Android/10.1.1 (${brand} ${model}; Android ${android})`;
            if(platform === 'SNAPCHAT') ua += ` Snapchat/12.1.0.1 (Device:${model}; OS:${android};)`;
            if(platform === 'LINKEDIN') ua += ` [LinkedInApp;]`;

            html += `
                <div class="ua-card">
                    <div class="ua-text">${ua}</div>
                    <button class="copy-btn" onclick="copyToClipboard(this, '${ua}')">COPY</button>
                </div>`;
        }

        document.getElementById('output').innerHTML = html;
        document.getElementById('time').innerText = Math.round(performance.now() - startTime) + "ms";
    }

    function copyToClipboard(btn, text) {
        navigator.clipboard.writeText(text);
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.background = "#0CBB52";
        btn.style.color = "white";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#E8F2FF";
            btn.style.color = "#097BED";
        }, 1000);
    }
</script>

</body>
</html>
